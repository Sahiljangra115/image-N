# Self-contained stack: the RAG app + its own Ollama. No host dependency.
# First run, pull the model once:
#   docker compose up -d
#   docker compose exec ollama ollama pull qwen3.5:4b
# Then open http://127.0.0.1:8000
services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama   # keep pulled models across restarts
    # ponytail: GPU is optional. Uncomment to use the host GPU for the LLM.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      # talk to the ollama service by its compose name, not host.docker.internal
      - OLLAMA_HOST=http://ollama:11434
      - DATA_PATH=data/maya_binder.txt
    depends_on:
      - ollama

volumes:
  ollama_models:
